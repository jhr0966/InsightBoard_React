<div class="dm-shell">
<!-- ── Page header (수집 현황 요약) ───────────────────────
     #133 재설계 이후 본문(카드 그리드·수집잡·서브카드)은 Streamlit 위젯/`sc-*`
     마크업이 대체한다. 이 템플릿은 _render_dm_header 가 쓰는 헤더(KPI 4종)만 남기고,
     끝의 split 마커(아래 placeholder)로 헤더 부분만 잘라 쓴다.
     주의: 이 주석에 그 마커 토큰을 그대로 적으면 split 이 헤더를 통째로 잘라먹는다. -->
      <header class="dm-head">
        <div>
          <div class="dm-bc">
            <span>워크플로</span>
            <span class="dm-bc-sep">›</span>
            <span class="dm-bc-cur">뉴스 수집</span>
          </div>
          <p class="dm-desc">
            매일 수집되는 출처와 검색 가능한 뉴스 데이터베이스, SOLA가 제안하는 수집 키워드를 한곳에서 관리합니다.
          </p>
        </div>
        <div class="dm-head-stats">
          <div class="dm-stat">
            <div class="dm-stat-v">{{ACTIVE_SOURCES}}</div>
            <div class="dm-stat-k">활성 출처</div>
          </div>
          <div class="dm-stat-sep"></div>
          <div class="dm-stat">
            <div class="dm-stat-v dm-good">{{TODAY_COUNT}}<small>건/일</small></div>
            <div class="dm-stat-k">수집량</div>
          </div>
          <div class="dm-stat-sep"></div>
          <div class="dm-stat">
            <div class="dm-stat-v">{{TOTAL_CHUNKS}}</div>
            <div class="dm-stat-k">DB chunks</div>
          </div>
          <div class="dm-stat-sep"></div>
          <div class="dm-stat">
            <div class="dm-stat-v">{{LAST_UPDATE}}</div>
            <div class="dm-stat-k">마지막 갱신</div>
          </div>
        </div>
      </header>
      {{DM_TABS}}
