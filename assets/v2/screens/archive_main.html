<div class="oa-shell">
<header class="oa-head">
        <div class="oa-head-l">
          <div class="oa-bc">
            <span>워크플로</span>
            <span class="oa-bc-sep">›</span>
            <span class="oa-bc-cur">산출물 보관함</span>
          </div>
          <h1 class="oa-title">산출물 보관함 <span class="oa-title-sub">제안서 · 브리핑 · 분석 보고서</span></h1>
          <p class="oa-desc">
            SOLA 와 함께 만든 모든 산출물의 사후 관리실. <b>대기 → 채택 → 적용</b> 흐름을
            추적하고, 채택된 결과물은 다음 분석 컨텍스트로 자동 사용됩니다.
          </p>
        </div>
        <div class="oa-head-stats">
          <div class="oa-stat">
            <div class="oa-stat-v">{{OA_TOTAL}}</div>
            <div class="oa-stat-k">총 산출물</div>
            <div class="oa-stat-d">전체</div>
          </div>
          <div class="oa-stat-sep"></div>
          <div class="oa-stat">
            <div class="oa-stat-v oa-good">{{OA_ADOPTED}}</div>
            <div class="oa-stat-k">채택</div>
            <div class="oa-stat-d">{{OA_ADOPTED_PCT}}</div>
          </div>
          <div class="oa-stat-sep"></div>
          <div class="oa-stat">
            <div class="oa-stat-v oa-info">{{OA_PENDING}}</div>
            <div class="oa-stat-k">대기</div>
            <div class="oa-stat-d">검토 대기</div>
          </div>
          <div class="oa-stat-sep"></div>
          <div class="oa-stat">
            <div class="oa-stat-v oa-warn">{{OA_REJECTED}}</div>
            <div class="oa-stat-k">기각</div>
            <div class="oa-stat-d">사유 기록</div>
          </div>
        </div>
      </header>
    </div>
