name: daily-collect

# 배포된 백엔드(Render)를 HTTP 로 트리거해 뉴스를 수집한다.
#
# 왜 이 방식인가: 라이브 앱은 백엔드(Render) 자신의 디스크에서 뉴스를 읽는다.
# GitHub Actions 러너에서 수집하면 러너 디스크(휘발)에만 저장돼 앱에 도달하지
# 못한다(구 scrape-daily.yml 이 그랬고, data/news 는 gitignore 라 commit 도 no-op).
# 그래서 여기서는 러너가 수집하지 않고, 배포된 `/api/collect` 를 호출해 **백엔드가
# 자기 저장소에 수집**하도록 한다.
#
# 무료 플랜 특성상 백엔드가 슬립·재배포되면 데이터가 초기화된다("수시로 없어짐").
# 이를 완화하려고 하루 여러 번(아침·낮·저녁) 돌린다 — ① 사용 시간대에 뉴스를 항상
# 최신으로 유지하고 ② 호출이 곧 인스턴스 웨이크업이라 사용 시간대에 슬립도 줄인다.
# 같은 날 재수집은 enrich 캐시로 대부분 네트워크를 건너뛰어 빠르고 저렴하다.
#
# 백엔드 주소는 repo variable `BACKEND_URL` 로 설정(Settings → Secrets and
# variables → Actions → Variables). 미설정 시 아래 기본값을 쓴다.

on:
  schedule:
    # KST 07:00 / 13:00 / 18:00  (UTC 22:00 전날 · 04:00 · 09:00)
    - cron: "0 22,4,9 * * *"
  workflow_dispatch:
    inputs:
      keywords:
        description: "공백으로 구분된 키워드 (미지정 시 백엔드 기본 키워드)"
        required: false
        default: ""
      max_results:
        description: "키워드/사이트당 최대 건수"
        required: false
        default: "10"

# 이 워크플로는 repo 에 아무것도 쓰지 않는다(외부 HTTP 호출만).
permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve backend URL
        id: cfg
        run: |
          URL="${{ vars.BACKEND_URL }}"
          if [ -z "$URL" ]; then
            URL="https://insightboard-api-k24c.onrender.com"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "백엔드: $URL"

      - name: Wake backend (health)
        # 무료 Render 는 15분 미사용 시 슬립 → 첫 요청에서 콜드스타트(최대 ~60s).
        # /api/health 가 200 을 줄 때까지 재시도해 인스턴스를 깨운다.
        run: |
          URL="${{ steps.cfg.outputs.url }}"
          for i in $(seq 1 12); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "$URL/api/health" || echo 000)
            echo "health 시도 $i → HTTP $code"
            if [ "$code" = "200" ]; then
              echo "백엔드 정상."
              exit 0
            fi
            sleep 10
          done
          echo "::error::백엔드 health 응답 없음 — 배포 상태를 확인하세요."
          exit 1

      - name: Trigger collection
        # /api/collect (동기) 는 수집·enrich 후 요약 JSON 을 반환한다. 수집이
        # 수 분 걸릴 수 있어 넉넉한 타임아웃(10분)을 준다.
        run: |
          URL="${{ steps.cfg.outputs.url }}"
          KW='${{ github.event.inputs.keywords }}'
          MAX="${{ github.event.inputs.max_results || '10' }}"
          # keywords 를 JSON 배열로 — 비면 [](백엔드가 기본 키워드로 폴백).
          if [ -n "$KW" ]; then
            KW_JSON=$(printf '%s' "$KW" | tr ' ' '\n' | grep -v '^$' | \
              python3 -c 'import sys,json; print(json.dumps([l.strip() for l in sys.stdin]))')
          else
            KW_JSON='[]'
          fi
          BODY=$(printf '{"keywords":%s,"max_results":%s,"do_enrich":true}' "$KW_JSON" "$MAX")
          echo "요청 본문: $BODY"
          resp=$(curl -sS --max-time 600 -X POST "$URL/api/collect" \
            -H "Content-Type: application/json" -d "$BODY")
          echo "응답: $resp"
          # 결과 판정 — 저장 0건이면 경고(차단/셀렉터 파손 신호)하되 실패로 막지 않는다.
          # ⚠ 응답은 env(RESP) 로 전달한다. `echo | python3 - <<PY` 는 heredoc 이
          #   stdin 을 차지해 파이프 내용이 스크립트에 도달하지 않는다 — 수집이
          #   성공했는데도 "파싱 실패"로 워크플로가 빨갛게 되던 버그의 원인.
          RESP="$resp" python3 - <<'PY'
          import json, os, sys
          try:
              d = json.loads(os.environ.get("RESP", ""))
          except Exception as e:
              print(f"::error::응답 파싱 실패: {e}")
              sys.exit(1)
          total = int(d.get("total_articles", 0) or 0)
          errs = d.get("errors") or []
          print(f"수집 {total}건 · 오류 {len(errs)}건")
          for e in errs[:10]:
              print(f"  ✗ {e.get('source','')} [{e.get('keyword','')}] {e.get('error','')}")
          if total == 0:
              print("::warning::수집 0건 — 소스 차단·셀렉터 파손 가능. 수집 관리 화면의 '수집 로그'로 확인하세요.")
          PY
